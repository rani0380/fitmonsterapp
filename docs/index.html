<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Fit Monster 설치</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07111d;
        --card: #10233d;
        --text: #f4f8ff;
        --soft: #b6c5d8;
        --green: #89d857;
        --yellow: #ffd84a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at 80% 8%, rgba(255, 216, 74, 0.22), transparent 28rem),
          radial-gradient(circle at 12% 72%, rgba(137, 216, 87, 0.2), transparent 22rem),
          var(--bg);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 460px);
        padding: 28px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        background: rgba(16, 35, 61, 0.88);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.38);
      }

      h1 {
        margin: 0 0 10px;
        font-size: 34px;
        line-height: 1.08;
      }

      p {
        margin: 0;
        color: var(--soft);
        line-height: 1.55;
      }

      .badge {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        margin-bottom: 18px;
        padding: 7px 11px;
        border-radius: 999px;
        background: rgba(137, 216, 87, 0.16);
        color: var(--green);
        font-size: 13px;
        font-weight: 800;
      }

      .download {
        display: block;
        margin: 24px 0 18px;
        padding: 16px 18px;
        border-radius: 18px;
        background: var(--yellow);
        color: #132033;
        text-align: center;
        text-decoration: none;
        font-size: 18px;
        font-weight: 900;
      }

      ol {
        margin: 18px 0 0;
        padding-left: 20px;
        color: var(--soft);
      }

      li {
        margin: 8px 0;
        line-height: 1.45;
      }

      .note {
        margin-top: 18px;
        padding: 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Android APK 설치</div>
      <h1>Fit Monster</h1>
      <p>
        카메라로 동작을 인식해서 스쿼트와 러닝 게임을 즐기는 AI 피트니스 앱입니다.
      </p>

      <a
        class="download"
        href="https://github.com/rani0380/fitmonsterapp/releases/latest/download/fitmonsterapp.apk"
      >
        APK 다운로드
      </a>

      <p>설치 방법</p>
      <ol>
        <li>위 버튼을 눌러 APK 파일을 다운로드합니다.</li>
        <li>휴대폰에서 다운로드한 APK를 엽니다.</li>
        <li>안내가 나오면 “알 수 없는 앱 설치 허용”을 켭니다.</li>
        <li>설치 후 카메라 권한을 허용합니다.</li>
      </ol>

      <p class="note">
        이 페이지는 링크를 아는 사람만 접근할 수 있도록 QR 코드로 공유하기 위한 설치 안내 페이지입니다.
      </p>
    </main>
  </body>
</html>
